<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a365d">
<title>🏖️ 가평 여행 일정</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#e3e9f0;color:#2d3748;font-size:14px}

/* RESPONSIVE WRAPPER — centers + caps width on desktop, full-bleed on mobile */
.wrap{max-width:1080px;margin:0 auto;background:#f0f4f8;min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a365d 0%,#2b6cb0 55%,#4299e1 100%);color:#fff;padding:18px 16px 14px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
.hdr p{font-size:11px;opacity:.75;margin-top:4px}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:20}
.tab{padding:11px 16px;font-size:12px;font-weight:700;color:#a0aec0;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s}
.tab:hover{color:#4a5568}
.tab.on{color:#2b6cb0;border-bottom-color:#2b6cb0}
.panel{display:none}.panel.on{display:block}

/* SUMMARY */
.sum{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px}
.card{background:#fff;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.card .v{font-size:15px;font-weight:800;color:#2b6cb0}
.card .l{font-size:10px;color:#a0aec0;margin-top:3px}

/* CONTROLS */
.ctl{padding:0 12px 8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.addbtn{background:#2b6cb0;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.addbtn:hover{background:#2c5282}
.fsel{border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit;color:#4a5568;cursor:pointer}
.fsel:focus{border-color:#63b3ed}

/* TABLE WRAPPER */
.tw{padding:0 12px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}

/* TABLE BASE */
table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);min-width:660px}
thead tr{background:#f8fafc}
thead th{padding:10px 8px;text-align:left;font-size:10px;font-weight:700;color:#a0aec0;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;border-bottom:1.5px solid #edf2f7}

/* BODY ROWS */
tbody tr{border-bottom:1px solid #f0f4f8;border-left:4px solid transparent;transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8faff}
tbody tr.dn{opacity:.38}
tbody tr.dn .ni{text-decoration:line-through}

/* INLINE INPUTS */
.ni{border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:#1a202c;padding:5px 6px;width:100%;border-radius:6px;outline:none}
.ni:focus{background:#ebf8ff;box-shadow:inset 0 0 0 1.5px #63b3ed;color:#2b6cb0}
.nu{border:none;background:transparent;font-family:inherit;font-size:12px;color:#718096;padding:4px 5px;width:100%;border-radius:6px;outline:none;text-align:center}
.nu:focus{background:#ebf8ff;box-shadow:inset 0 0 0 1.5px #63b3ed}
.nn{border:none;background:transparent;font-family:inherit;font-size:13px;color:#2d3748;padding:5px 4px;width:100%;border-radius:6px;outline:none;text-align:center}
.nn:focus{background:#ebf8ff;box-shadow:inset 0 0 0 1.5px #63b3ed}
.ns{border:none;background:transparent;font-family:inherit;font-size:11px;padding:4px 3px;border-radius:7px;cursor:pointer;width:100%;color:#2d3748;outline:none}
.ns:hover{background:#f0f4f8}
.ns:focus{background:#ebf8ff;outline:1.5px solid #63b3ed}

/* TABLE CELLS */
td{padding:4px 6px;vertical-align:middle}
.tc{font-weight:800;color:#2b6cb0;white-space:nowrap;font-size:13px;text-align:right;padding-right:8px}
.delbtn{background:none;border:none;color:#e2e8f0;cursor:pointer;font-size:14px;padding:3px 5px;border-radius:6px;transition:all .15s}
.delbtn:hover{background:#fff5f5;color:#e53e3e}

/* TABLE FOOTER */
tfoot td{background:#edf8ff;padding:10px 8px;font-weight:800;color:#2b6cb0;font-size:13px;border-top:2px solid #bee3f8}

/* ACCORDION PANELS */
.sec{margin:0 12px 12px}
.ac-card{background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.08);overflow:hidden}
.ac-hd{padding:12px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .1s}
.ac-hd:hover{background:#f9fafb}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;flex-shrink:0}
.acn{font-weight:700;font-size:14px;flex:1}
.ac-amt{font-weight:800;font-size:15px;color:#2b6cb0}
.ac-cnt{font-size:11px;color:#718096;background:#edf2f7;padding:2px 8px;border-radius:10px}
.ac-body{display:none}.ac-body.op{display:block}

/* ACCORDION ROWS */
.ac-row{display:flex;align-items:center;gap:8px;padding:9px 16px;border-top:1px solid #f7fafc;font-size:12px}
.ac-row:hover{background:#f9fafb}
.ac-name{flex:1;font-weight:500;color:#2d3748}
.ac-qty{color:#a0aec0;font-size:11px;min-width:54px}
.ac-price{font-weight:700;color:#2b6cb0;min-width:64px;text-align:right;font-size:12px}

/* PERSONAL GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.pg-item{background:#fff;border-radius:10px;padding:11px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.pg-item:hover{background:#f7faff}
.pg-item.dn .pg-name{text-decoration:line-through;color:#a0aec0}
.pg-name{font-size:13px;font-weight:600;flex:1}
.pg-sub{font-size:11px;color:#a0aec0;margin-top:2px}

/* PEOPLE */
.pp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px}
.pp-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px}
.pp-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.pp-del{background:none;border:none;color:#e2e8f0;cursor:pointer;font-size:15px;margin-left:auto;transition:color .1s}
.pp-del:hover{color:#fc8181}

/* MISC */
.emp{text-align:center;padding:44px 20px;color:#c0ccda}
.emp .ei{font-size:36px;margin-bottom:8px}
.inp-s{border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 9px;font-size:12px;outline:none;font-family:inherit;color:#2d3748}
.inp-s:focus{border-color:#63b3ed}

/* ============ RESPONSIVE ============ */
/* Phones: tighter summary so 4 cards never overflow; 2-up on very small */
@media (max-width:520px){
  .sum{grid-template-columns:repeat(2,1fr)}
  .card .v{font-size:14px}
  .ctl{padding:0 10px 8px}
  .tw{padding:0 10px 20px}
  .sec,.pp-grid,#pgrid{margin-left:10px;margin-right:10px}
}
@media (max-width:360px){
  body{font-size:13px}
  .hdr h1{font-size:18px}
  .tab{padding:11px 12px}
}
/* Tablet / desktop: roomier header, full-height card look, larger touch areas */
@media (min-width:768px){
  body{padding:0}
  .wrap{box-shadow:0 0 40px rgba(26,54,93,.12);min-height:100vh}
  .hdr{padding:26px 28px 22px}
  .hdr h1{font-size:26px}
  .hdr p{font-size:13px;margin-top:6px}
  .tab{padding:14px 22px;font-size:13px}
  .sum{grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 20px}
  .card{padding:18px 12px;border-radius:14px}
  .card .v{font-size:20px}
  .card .l{font-size:12px}
  .ctl{padding:0 20px 12px;gap:8px}
  .tw,.sec{padding-left:20px;padding-right:20px}
  .sec{margin-left:8px;margin-right:8px}
  table{font-size:14px}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
}
@media (min-width:1080px){
  body{padding:24px 0}
  .wrap{min-height:calc(100vh - 48px);border-radius:18px;overflow:hidden}
}
</style>
</head>

// ==================== HELPERS ====================
const npl = () => parseInt(document.getElementById('nppl')?.value||10)||10;

function rSum(el) {
  const e = document.getElementById(el); if(!e) return;
  const t = SUM(items.map(IT)), n = npl(), dn = items.filter(i=>i.done).length;
  const mt = SUM(items.filter(i=>i.pt==='마트').map(IT));
  e.innerHTML = `
    <div class="card"><div class="v">${t>0?t.toLocaleString()+'원':'0원'}</div><div class="l">총 예상금액</div></div>
    <div class="card"><div class="v">${(Math.round(t/n)).toLocaleString()}원</div><div class="l">1인당 (${n}명)</div></div>
    <div class="card"><div class="v">${mt>0?mt.toLocaleString()+'원':'-'}</div><div class="l">마트구매액</div></div>
    <div class="card"><div class="v">${dn}/${items.length}</div><div class="l">완료</div></div>`;
}
function rSumAll() { ['sum1','sum2','sum3'].forEach(rSum); }

function catOpts(sel) {
  return CATS.map(c=>`<option value="${c.id}"${sel===c.id?' selected':''}>${c.lbl}</option>`).join('');
}
function ptOpts(sel) {
  return Object.entries(PT).map(([k,v])=>`<option value="${k}"${sel===k?' selected':''}>${v.lbl}</option>`).join('');
}
function perOpts(sel) {
  return `<option value=""${sel===''?' selected':''}>미정</option>` +
    ppl.map(p=>`<option value="${p.id}"${sel===p.id?' selected':''}>${p.name}</option>`).join('');
}

function fillFilters() {
  const cs = document.getElementById('fcat');
  const ep = [...cs.options].map(o=>o.value);
  CATS.forEach(c=>{ if(!ep.includes(c.id)) cs.add(new Option(c.lbl, c.id)); });
  const ps = document.getElementById('fper');
  const ep2 = [...ps.options].map(o=>o.value);
  ppl.forEach(p=>{ if(!ep2.includes(p.id)) ps.add(new Option(p.name, p.id)); });
}

function getFiltered() {
  const cf = document.getElementById('fcat').value;
  const pf = document.getElementById('fper').value;
  const ptf = document.getElementById('fpt').value;
  let d = [...items];
  if(cf)  d = d.filter(i=>i.cat===cf);
  if(pf)  d = d.filter(i=>i.person===pf);
  if(ptf) d = d.filter(i=>i.pt===ptf);
  return d;
}

// ==================== INLINE SAVE (no re-render) ====================
function sv(id, f, v) {
  const it = items.find(i=>i.id===id); if(!it) return;
  it[f] = v;
  if(f==='cat') {
    const row = document.getElementById('r'+id);
    if(row) row.style.borderLeftColor = C(v).bg;
  }
  rSum('sum1');
}
function svn(id, f, v) {
  const it = items.find(i=>i.id===id); if(!it) return;
  it[f] = parseFloat(v)||0;
  const tc = document.getElementById('tc'+id);
  if(tc) tc.textContent = IT(it)>0 ? IT(it).toLocaleString()+'원' : '-';
  updateFoot();
  rSum('sum1');
}
function tgDone(id) {
  const it = items.find(i=>i.id===id); if(!it) return;
  it.done = !it.done;
  const row = document.getElementById('r'+id);
  if(row) row.classList.toggle('dn', it.done);
  rSum('sum1');
}
function updateFoot() {
  const d = getFiltered(), t = SUM(d.map(IT));
  const tf = document.getElementById('tf');
  if(tf) tf.innerHTML = t>0 ?
    `<tr><td colspan="6" style="text-align:right;padding:10px 8px">합계</td>
     <td style="padding:10px 8px">${t.toLocaleString()}원</td>
     <td colspan="3"></td></tr>` : '';
}

// ==================== ROW HTML ====================
function rowHTML(it) {
  const sn = it.name.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  return `
    <td style="padding:4px 4px 4px 8px">
      <input type="checkbox" ${it.done?'checked':''} onchange="tgDone(${it.id})"
        style="cursor:pointer;width:15px;height:15px;accent-color:#3182ce">
    </td>
    <td><input type="text" class="ni" value="${sn}"
      onchange="sv(${it.id},'name',this.value)"
      onkeydown="if(event.key==='Enter')this.blur()"></td>
    <td><select class="ns" onchange="sv(${it.id},'cat',this.value)">${catOpts(it.cat)}</select></td>
    <td><input type="number" class="nn" value="${it.qty}" step="0.5" min="0"
      onchange="svn(${it.id},'qty',this.value)"></td>
    <td><input type="text" class="nu" value="${it.unit}"
      onchange="sv(${it.id},'unit',this.value)"></td>
    <td><input type="number" class="nn" value="${it.price}" min="0"
      onchange="svn(${it.id},'price',this.value)"></td>
    <td class="tc" id="tc${it.id}">${IT(it)>0?IT(it).toLocaleString()+'원':'-'}</td>
    <td><select class="ns" onchange="sv(${it.id},'pt',this.value)">${ptOpts(it.pt)}</select></td>
    <td><select class="ns" onchange="sv(${it.id},'person',this.value)">${perOpts(it.person)}</select></td>
    <td style="padding:4px 6px 4px 2px">
      <button class="delbtn" onclick="delI(${it.id})" title="삭제">✕</button>
    </td>`;
}

// ==================== TABLE RENDER ====================
function rTable() {
  fillFilters(); rSum('sum1');
  const d = getFiltered();
  const tb = document.getElementById('tb');
  const em = document.getElementById('emp');
  if(!d.length) { tb.innerHTML=''; em.style.display='block'; updateFoot(); return; }
  em.style.display = 'none';
  tb.innerHTML = d.map(it => {
    const cat = C(it.cat);
    return `<tr id="r${it.id}" class="${it.done?'dn':''}" style="border-left:4px solid ${cat.bg}">${rowHTML(it)}</tr>`;
  }).join('');
  updateFoot();
}

// ==================== ADD / DELETE ====================
function addRow() {
  // clear filters first so new row is visible
  document.getElementById('fcat').value = '';
  document.getElementById('fper').value = '';
  document.getElementById('fpt').value  = '';
  const it = {id:nid++, name:'새 항목', cat:'기타', qty:1, unit:'개', price:0, person:'', pt:'마트', done:false};
  items.push(it);
  rTable();
  // focus the name input of the new row
  setTimeout(()=>{
    const newRow = document.getElementById('r'+it.id);
    if(newRow) {
      const inp = newRow.querySelector('.ni');
      if(inp) { inp.focus(); inp.select(); }
      newRow.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }, 60);
}

function delI(id) {
  if(!confirm('삭제할까요?')) return;
  items = items.filter(i=>i.id!==id);
  const row = document.getElementById('r'+id);
  if(row) row.remove();
  updateFoot(); rSum('sum1');
  if(getFiltered().length===0) document.getElementById('emp').style.display='block';
}

// ==================== MART PANEL ====================
function rMart() {
  rSum('sum2');
  const mi = items.filter(i=>i.pt==='마트'||i.pt==='주문');
  const gs = [];
  ppl.forEach(p=>{
    const pi = mi.filter(i=>i.person===p.id);
    if(pi.length) gs.push({p, its:pi});
  });
  const ua = mi.filter(i=>!ppl.find(p=>p.id===i.person));
  if(ua.length) gs.push({p:null, its:ua});
  if(!gs.length) {
    document.getElementById('mart-sec').innerHTML='<div class="emp"><div class="ei">🛒</div><p>마트구매 항목 없음</p></div>';
    return;
  }
  document.getElementById('mart-sec').innerHTML = gs.map(g=>{
    const p=g.p, k=(p?p.id:'ua')+'m', op=acc[k], t2=SUM(g.its.map(IT));
    return `<div class="ac-card">
      <div class="ac-hd" onclick="tgA('${k}',rMart)">
        <div class="av" style="background:${p?p.color:'#a0aec0'}">${p?p.name[0]:'?'}</div>
        <span class="acn">${p?p.name:'담당자 미정'}</span>
        <span class="ac-cnt">${g.its.length}개</span>
        <span class="ac-amt">${t2>0?t2.toLocaleString()+'원':'-'}</span>
        <span style="color:#c0ccda;margin-left:4px;font-size:12px">${op?'▲':'▼'}</span>
      </div>
      <div class="ac-body ${op?'op':''}">
        ${g.its.map(it=>`<div class="ac-row">
          <input type="checkbox" ${it.done?'checked':''} onchange="tgPD(${it.id},'mart')"
            style="cursor:pointer;width:13px;height:13px;flex-shrink:0;accent-color:#3182ce">
          <span class="ac-name" id="mn${it.id}" style="${it.done?'text-decoration:line-through;opacity:.4':''}">${it.name}</span>
          <span class="ac-qty">${it.qty}${it.unit?' '+it.unit:''}</span>
          <span style="font-size:10px;color:#a0aec0">${(PT[it.pt]||{lbl:''}).lbl}</span>
          <span class="ac-price">${IT(it)>0?IT(it).toLocaleString()+'원':'-'}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function tgA(k, fn) { acc[k]=!acc[k]; fn(); }

// Panel done toggle (re-renders the current panel)
function tgPD(id, panel) {
  const it = items.find(i=>i.id===id); if(!it) return;
  it.done = !it.done;
  if(panel==='mart') rMart();
  else if(panel==='by') rBy();
  else if(panel==='personal') rPersonal();
  rSum('sum1');
}

function rPpl() {
  document.getElementById('pgrid').innerHTML = ppl.map(p=>`
    <div class="pp-card">
      <div class="pp-av" style="background:${p.color}">${p.name[0]}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px">${p.name}</div>

      </div>
      <button class="pp-del" onclick="delPP('${p.id}')">✕</button>
    </div>`).join('');
}
function addPP() {
  const nm = document.getElementById('nname').value.trim();
  const cl = document.getElementById('ncolor').value.trim() || '#718096';
  if(!nm) return alert('이름을 입력하세요');
  ppl.push({id:'p'+Date.now(), name:nm, color:cl});
  document.getElementById('nname').value = '';
  document.getElementById('ncolor').value = '';
  rPpl();
  if(document.getElementById('panel-list').classList.contains('on')) rTable();
}
function delPP(id) {
  if(!confirm('삭제하면 해당 담당자 품목이 미배정됩니다')) return;
  items.forEach(i=>{ if(i.person===id) i.person=''; });
  ppl = ppl.filter(p=>p.id!==id);
  document.querySelectorAll(`#fper option[value="${id}"]`).forEach(o=>o.remove());
  rPpl();
  if(document.getElementById('panel-list').classList.contains('on')) rTable();
}

// ==================== TABS ====================
const PR = {list:rTable, mart:rMart, personal:rPersonal, by:rBy, ppl:rPpl};
function go(nm) {
  const names = ['list','mart','personal','by','ppl'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on', names[i]===nm));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+nm).classList.add('on');
  PR[nm]();
}

// ==================== INIT ====================
document.getElementById('hs').textContent = `총 ${items.length}개 | 10인 기준 | 수정 · 은미 · 탁이`;
rTable();
</script>
